# Supabase configuration
# See: https://supabase.com/docs/guides/cli/config

# Project ID is passed via --project-ref flag during deployment

[db]
# Port to use for the local database
port = 54322

[api]
# Port to use for the API
port = 54321

[functions.process-text]
# Disable JWT verification, this function is a public utility
# that generates titles and quiz questions using Groq LLM and doesn't access user data
verify_jwt = false

[functions.validate-quiz]
# Disable JWT verification, this function validates quiz quality
# and is called by the worker, not directly by users
verify_jwt = false

[functions.process-text-worker]
# Disable JWT verification - worker is called by pg_cron, not directly by users
# Security: URL not publicly documented, only processes jobs from internal queue
verify_jwt = false

[functions.validate-quiz-worker]
# Disable JWT verification - worker is called by pg_cron, not directly by users
# Security: URL not publicly documented, only processes jobs from internal queue
verify_jwt = false

[functions.leaderboard]
# Called by the frontend after quiz save to update Redis leaderboard cache.
# JWT disabled because the function uses the service role key internally.
verify_jwt = false
