name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json
      - name: Install root deps
        run: npm ci
      - name: Install frontend deps
        run: npm ci --prefix frontend
      - name: Install backend deps
        run: npm ci --prefix backend
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - name: Install frontend deps
        run: npm ci --prefix frontend
      - name: Install backend deps
        run: npm ci --prefix backend
      - name: Frontend unit tests
        run: npm run test:run --prefix frontend
      - name: Backend unit tests
        run: npm run test:run --prefix backend

  build:
    name: Build (smoke)
    runs-on: ubuntu-latest
    needs: [lint-and-format, unit-tests]
    env:
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: test-anon-key
      VITE_UPSTASH_REDIS_REST_URL: http://localhost:8079
      VITE_UPSTASH_REDIS_REST_READ_TOKEN: test-token
      VITE_BASE_PATH: /
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm run build
