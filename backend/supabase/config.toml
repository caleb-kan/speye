# Supabase configuration
# See: https://supabase.com/docs/guides/cli/config

# Project ID is passed via --project-ref flag during deployment

[db]
# Port to use for the local database
port = 54322

[api]
# Port to use for the API
port = 54321

[functions.process-text]
# Disable JWT verification, this function is a public utility
# that generates titles and quiz questions using Groq LLM and doesn't access user data
verify_jwt = false
